<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter AI Chat</title>
    <style>
        /* Sohbet ekranının genel görünümü */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #0078d4;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* Mesaj balonları */
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #0078d4;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            background-color: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .system-message {
            background-color: transparent;
            color: #777;
            align-self: center;
            font-size: 0.9rem;
            font-style: italic;
        }
        /* Yazı yazma alanı */
        .chat-input-area {
            display: flex;
            border-top: 1px solid #e9ecef;
            padding: 10px;
            background-color: #f8f9fa;
        }
        .chat-input-area input {
            flex: 1;
            border: 1px solid #ced4da;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input-area input:focus {
            border-color: #0078d4;
        }
        .chat-input-area button {
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-left: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: background-color 0.2s;
        }
        .chat-input-area button:hover {
            background-color: #005a9e;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Puter AI Asistanı</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message system-message">Puter.js yüklendi. Konuşmaya başlayabilirsiniz!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <!-- Puter.js Kütüphanesi -->
    <script src="https://js.puter.com/v2/"></script>
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Ekranın içine mesaj ekleme fonksiyonu
        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            
            if (sender === 'user') {
                messageDiv.classList.add('user-message');
            } else if (sender === 'ai') {
                messageDiv.classList.add('ai-message');
            } else {
                messageDiv.classList.add('system-message');
            }
            
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            
            // Yeni bir mesaj geldiğinde sohbeti otomatik en aşağı kaydırır
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        // Mesaj gönderme fonksiyonu
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return; // Boş mesaj atılmasını engeller

            // Kullanıcının yazdığı mesajı ekrana ekle ve kutuyu temizle
            appendMessage(text, 'user');
            userInput.value = '';

            // AI düşünürken ekranda geçici bir durum göster
            const loadingMessage = appendMessage("Yapay zeka yanıt yazıyor...", "system");

            try {
                // Puter AI servisini çağırıyoruz
                const response = await puter.ai.chat(text, {
                    model: 'gpt-5.4-nano',
                });

                // Düşünüyor yazısını kaldır
                loadingMessage.remove();

                // Yapay zekanın yanıtını ekrana ekle
                appendMessage(response, 'ai');
            } catch (error) {
                loadingMessage.remove();
                appendMessage("Bir hata oluştu: " + error.message, "system");
            }
        }

        // Gönder butonuna tıklandığında gönder
        sendBtn.addEventListener('click', sendMessage);

        // Klavyeden Enter tuşuna basıldığında gönder
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
