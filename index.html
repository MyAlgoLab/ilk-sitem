<html>
<body>
    <script src="https://js.puter.com/v2/"></script>
    <script>
        puter.print(`Yükleniyor...`);

        puter.ai.chat(`What is matrix?`, {
            model: 'gpt-5.4-nano',
        }).then(cevap => {
            puter.print(cevap);

            // 1. Gelen cevabı düz metin (text) olarak bir veriye (Blob) dönüştürüyoruz
            const blob = new Blob([cevap], { type: 'text/plain;charset=utf-8' });
            
            // 2. Tarayıcıda görünmez geçici bir indirme bağlantısı (link) oluşturuyoruz
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'cevap.txt'; // İndirilecek dosyanın adı
            
            // 3. Bağlantıya otomatik tıklatıp indirmeyi başlatıyoruz
            link.click();
            
            // 4. Belleği temizliyoruz
            URL.revokeObjectURL(link.href);
            puter.print("\n✔ Dosya başarıyla bilgisayarınıza indirildi!");
        }).catch(err => {
            puter.print("Hata oluştu: " + err.message);
        });
    </script>
</body>
</html>
